services:
  - type: web
    name: droi-ai-backend
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://droidev-studio.github.io
      - key: MODEL_REQUEST_TIMEOUT_MS
        value: "60000"
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WEB3FORMS_ACCESS_KEY
        sync: false
